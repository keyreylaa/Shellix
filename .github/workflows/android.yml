name: Android CI — Build APK only
on:
  push:
    branches:
      - main
      - dev
      - master
    paths-ignore:
      - '**/*.md'
  pull_request:
    branches:
      - main
      - dev
      - master
    paths-ignore:
      - '**/*.md'
  workflow_dispatch:

jobs:
  build-release:
    name: Build Release APK
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Accept Android SDK licenses
        run: yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses || true

      - name: Decode and create xed.keystore
        run: echo "${{ secrets.KEYSTORE }}" | base64 -d > /tmp/xed.keystore

      - name: Decode and create signing.properties
        run: echo "${{ secrets.PROP }}" | base64 -d > /tmp/signing.properties

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Set Commit Hash
        id: commit_hash
        run: echo "COMMIT_HASH=$(git rev-parse --short HEAD)" >> $GITHUB_ENV

      - name: Set PR suffix
        id: pr_suffix
        if: github.event_name == 'pull_request'
        run: echo "ARTIFACT_SUFFIX=-pr${{ github.event.pull_request.number }}" >> $GITHUB_ENV

      - name: Build with Gradle
        run: ./gradlew assembleRelease && mv app/build/outputs/apk/release/*.apk app/shellix-${{ env.COMMIT_HASH }}.apk
        env:
          KEYSTORE_FILE: /tmp/xed.keystore
          SIGNING_PROPERTIES_FILE: /tmp/signing.properties
        continue-on-error: false

      - name: Archive APK
        uses: actions/upload-artifact@v4
        with:
          name: Shellix-Release${{ env.ARTIFACT_SUFFIX }}
          path: app/shellix-${{ env.COMMIT_HASH }}.apk

      - name: Delete xed.keystore and signing.properties
        run: rm /tmp/xed.keystore /tmp/signing.properties
